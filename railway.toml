# Railway config-as-code — forces the Docker image CMD and avoids a broken dashboard
# start command such as `uvicorn ... --port $PORT` (literal "$PORT" crashes).
# https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m valorant_analyst.serve_production"
